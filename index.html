<!-- index.html -->
<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AR HUD TARGET LOCK</title>

  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Futuristic AR HUD navigation system" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- učitava tvoj HUD -->
  <iframe src="ar-hud.html"></iframe>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("SW registered"))
          .catch(err => console.log("SW error:", err));
      });
    }
  </script>

</body>
</html>
